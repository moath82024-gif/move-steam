<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOVE | Steam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1220;
    background-image:
    radial-gradient(circle at top,#143b7d33 0%,transparent 40%);
    color:#fff;
    display:flex;
    justify-content:center;
    padding:60px 20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

/* اللوقو */

.logo{
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:50%;
    display:block;
    margin:auto;

    box-shadow:
        0 0 15px rgba(45,140,255,.35),
        0 0 35px rgba(45,140,255,.20);

    transition:.35s;
}

.logo img:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 25px rgba(45,140,255,.60),
        0 0 50px rgba(45,140,255,.35);
}

/* الوصف */

.desc{
    color:#9ca3af;
    font-size:19px;
    margin-bottom:45px;
}

/* البنرات */

.banner{
    display:block;
    width:100%;
    border-radius:22px;
    margin-bottom:35px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,132,255,.20);
    transition:.35s;
}

.banner img{
    width:100%;
    display:block;
}

.banner:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 0 35px rgba(0,132,255,.55);
}

/* الفوتر */

.footer{
    margin-top:35px;
    color:#7d8aa5;
    font-size:15px;
}

.footer span{
    color:#2d8cff;
    font-weight:bold;
}

/* الجوال */

@media (max-width:768px){

body{
    padding:40px 15px;
}

.logo img{
    width:90px;
    height:90px;
}

.desc{
    font-size:17px;
    margin-bottom:30px;
}

.banner{
    border-radius:18px;
    margin-bottom:22px;
}

.footer{
    font-size:14px;
}

}
</style>

</head>

<body>

<div class="container">

<div class="logo">
    <img src="logo.png" alt="MOVE Logo">
</div>

<div class="desc">
اختر نوع حساب Steam
</div>

<a class="banner" href="https://salla.sa/movestore/steam-online/c25323818" target="_blank">
    <img src="online.png" alt="Steam Online">
</a>

<a class="banner" href="https://salla.sa/movestore/steam-offline/c758486836" target="_blank">
    <img src="offline.png" alt="Steam Offline">
</a>

<div class="footer">
© 2026 <span>MOVE STORE</span><br>
أفضل متجر للحسابات والألعاب الرقمية
</div>

</div>

</body>
</html>
